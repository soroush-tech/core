comment:
  layout: 'header, diff, flags, files,  components'
  behavior: default # Add a comment on every PR with updated coverage
  require_changes: false # Always show comment, even if no coverage change

# Gate PATCH coverage on the merged `web` flag (a single V8 pass over unit + browser +
# storybook), not the per-tier `unit`/`browser`/`storybook` flags. Those each run
# `all: true` over the whole tree, so a tier that never executes a file reports its lines
# at 0, and Codecov's cross-flag union leaves simple components' lines red even though
# another tier covers them. `web` reports each file once with real execution data; the
# per-tier flags stay uploaded for visibility but don't gate.
#
# patch only scores changed lines, so a PR that touches only one area contributes no patch
# lines for the other flags (and carryforward covers any flag that didn't upload) — listing
# every real flag keeps each area's patch gated without penalising untouched ones. project
# is intentionally left at its default (target: auto): the phantom lines cancel out between
# base and head there, and component_management already owns per-component project statuses.
coverage:
  status:
    patch:
      default:
        flags:
          # App/worker flags are hand-managed; the package flags below are generated.
          - web
          - e2e
          - api
          # gen:codecov-patch-flags start — regenerated by `pnpm gen:publish-options`; do not edit by hand
          - bench
          - design-system
          - eslint-config
          - playwright-coverage
          - schema
          - styled-system
          - vite-plugin-msw-server
          - vite-plugin-sitemap
          - vite-plugin-watch
          # gen:codecov-patch-flags end

# Change-gated CI jobs don't upload every flag on every commit. Carry the last
# known report forward so skipped flags keep their coverage instead of dropping
# to "No report uploaded". paths map each flag to the files it covers.
flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    # gen:codecov-flags start — regenerated by `pnpm gen:publish-options`; do not edit by hand
    - name: bench
      paths:
        - packages/bench/
    - name: design-system
      paths:
        - packages/design-system/
    - name: eslint-config
      paths:
        - packages/eslint-config/
    - name: playwright-coverage
      paths:
        - packages/playwright-coverage/
    - name: schema
      paths:
        - packages/schema/
    - name: styled-system
      paths:
        - packages/styled-system/
    - name: vite-plugin-msw-server
      paths:
        - packages/vite-plugin-msw-server/
    - name: vite-plugin-sitemap
      paths:
        - packages/vite-plugin-sitemap/
    - name: vite-plugin-watch
      paths:
        - packages/vite-plugin-watch/
    # gen:codecov-flags end
    - name: api
      paths:
        - workers/api/
    # App-level web flags (not package-generated). `web` is the merged unit+browser+storybook
    # pass that patch coverage gates on; `e2e` is the Playwright page coverage. Both scope to
    # apps/web so carryforward stays correct when the web/e2e jobs are change-gated out.
    - name: web
      paths:
        - apps/web/
    - name: e2e
      paths:
        - apps/web/

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        branches:
          - '!main'
  individual_components:
    # gen:codecov-components start — regenerated by `pnpm gen:publish-options`; do not edit by hand
    - component_id: bench
      name: bench
      paths:
        - packages/bench/**
    - component_id: design-system
      name: design-system
      paths:
        - packages/design-system/**
    - component_id: eslint-config
      name: eslint-config
      paths:
        - packages/eslint-config/**
    - component_id: playwright-coverage
      name: playwright-coverage
      paths:
        - packages/playwright-coverage/**
    - component_id: schema
      name: schema
      paths:
        - packages/schema/**
    - component_id: styled-system
      name: styled-system
      paths:
        - packages/styled-system/**
    - component_id: vite-plugin-msw-server
      name: vite-plugin-msw-server
      paths:
        - packages/vite-plugin-msw-server/**
    - component_id: vite-plugin-sitemap
      name: vite-plugin-sitemap
      paths:
        - packages/vite-plugin-sitemap/**
    - component_id: vite-plugin-watch
      name: vite-plugin-watch
      paths:
        - packages/vite-plugin-watch/**
    # gen:codecov-components end
    - component_id: api
      name: api
      paths:
        - workers/api/**
