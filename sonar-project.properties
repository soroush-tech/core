sonar.projectKey=soroush-tech_soroush.tech
sonar.organization=soroush-tech

# Ported upstream demo apps — not part of the workspace, CI, or shipped output.
# Exclude from analysis so their duplication and outdated demo deps don't gate the project.
sonar.exclusions=examples/**

# Each worker deliberately keeps its own copy of the config-generator scripts
# ("each worker configures itself" — see workers/README.md), so don't count that
# duplication against the quality gate.
sonar.cpd.exclusions=workers/*/scripts/*.mjs
