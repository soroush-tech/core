name: Label Affected Area
on:
  issues:
    types: [opened]
permissions:
  issues: write
concurrency:
  group: label-area-${{ github.event.issue.number }}
  cancel-in-progress: true
jobs:
  label:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Sync the `area:` label from the Affected area field
        uses: actions/github-script@v7.0.1
        env:
          # Allowlist of valid areas — only these may become labels, guarding against
          # arbitrary text hand-typed into a blank or edited issue body. `web` is
          # hand-managed; the packages are synced by `pnpm gen:publish-options`.
          ALLOWED_AREAS: |
            web
            # gen:issue-areas start — regenerated by `pnpm gen:publish-options`; do not edit by hand
            bench
            eslint-config
            playwright-coverage
            schema
            styled-system
            vite-plugin-msw-server
            vite-plugin-sitemap
            vite-plugin-watch
            # gen:issue-areas end
        with:
          script: |
            const { owner, repo } = context.repo
            const issue = context.payload.issue
            const issue_number = issue.number

            try {
              // Only known areas may become labels. Anything else (a hand-typed value in a
              // blank/edited body, or `_No response_`) is ignored — no label, no creation.
              const allowed = new Set(
                (process.env.ALLOWED_AREAS || '')
                  .split('\n')
                  .map((line) => line.trim())
                  .filter((line) => line && !line.startsWith('#'))
              )

              // The "Affected area" dropdown renders as a "### Affected area" section;
              // the selected option is the first non-empty line beneath it.
              const match = (issue.body || '').match(/###\s+Affected area\s*\n+([^\n]+)/)
              const value = match ? match[1].trim() : ''
              if (!allowed.has(value)) return

              const label = `area: ${value}`
              const current = (issue.labels || []).map((l) => (typeof l === 'string' ? l : l.name))
              if (current.includes(label)) return

              // addLabels rejects labels that don't exist yet, so create it on first use.
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label })
              } catch {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: '0052cc',
                  description: 'Affected area',
                })
              }

              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [label] })
            } catch (error) {
              // Surface the failure on the issue so a maintainer can label it by hand.
              await github.rest.issues
                .createComment({
                  owner,
                  repo,
                  issue_number,
                  body: `⚠️ Automatic area-labeling failed: ${error.message}`,
                })
                .catch(() => {})
              core.setFailed(`Area labeling failed: ${error.message}`)
            }
