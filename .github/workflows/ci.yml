name: Continuous Integration

on:
  push:
    branches:
      - 'main'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect node version / package manager once and which areas changed, then
  # expose everything as outputs the other jobs reuse via needs.prepare.outputs.*
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    outputs:
      node_version: ${{ steps.node-version.outputs.version }}
      manager: ${{ steps.detect-package-manager.outputs.manager }}
      command: ${{ steps.detect-package-manager.outputs.command }}
      runner: ${{ steps.detect-package-manager.outputs.runner }}
      playwright_version: ${{ steps.detect-playwright.outputs.version }}
      web: ${{ steps.assemble.outputs.web }}
      worker: ${{ steps.assemble.outputs.worker }}
      has_packages: ${{ steps.assemble.outputs.has_packages }}
      changed_packages: ${{ steps.assemble.outputs.changed_packages }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Read Node.js version from .nvmrc
        id: node-version
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/pnpm-lock.yaml" ]; then
            echo "manager=pnpm" >> $GITHUB_OUTPUT
            echo "command=install --frozen-lockfile" >> $GITHUB_OUTPUT
            echo "runner=pnpm" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install --frozen-lockfile --non-interactive" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npm" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi

      - name: Read Playwright version from package.json
        id: detect-playwright
        run: |
          VERSION=$(node -p "require('./apps/web/package.json').devDependencies?.['@playwright/test'] || require('./apps/web/package.json').dependencies?.['@playwright/test']")
          echo "version=${VERSION#^}" >> "$GITHUB_OUTPUT"

      # Discover apps / workers / packages (folders with a package.json) and the
      # workflow files, then build a per-entity paths-filter config so we can report
      # exactly which ones changed.
      - name: Discover workspace entities
        id: discover
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('fs')
          const dirsWithPkg = (root) => fs.existsSync(root) ? fs.readdirSync(root, { withFileTypes: true }).filter((d) => d.isDirectory() && fs.existsSync(`${root}/${d.name}/package.json`)).map((d) => d.name) : []
          const apps = dirsWithPkg('apps')
          const workers = dirsWithPkg('workers')
          const packages = dirsWithPkg('packages')
          const workflows = fs.readdirSync('.github/workflows').filter((f) => /\.ya?ml$/.test(f))
          const filters = {}
          apps.forEach((n) => (filters[`app__${n}`] = [`apps/${n}/**`]))
          workers.forEach((n) => (filters[`worker__${n}`] = [`workers/${n}/**`]))
          packages.forEach((n) => (filters[`pkg__${n}`] = [`packages/${n}/**`]))
          workflows.forEach((f) => (filters[`wf__${f.replace(/\.ya?ml$/, '')}`] = [`.github/workflows/${f}`]))
          // Root = build/deploy-affecting top-level files only (lockfile, workspace,
          // manifest, .nvmrc, tsconfig). Root docs/tooling dotfiles must NOT trigger a
          // full workspace validate + deploy, so list them explicitly rather than glob.
          filters.root = ['pnpm-lock.yaml', 'pnpm-workspace.yaml', 'package.json', '.nvmrc', 'tsconfig.json']
          console.log(`filters=${JSON.stringify(filters)}`)
          console.log(`packages=${JSON.stringify(packages)}`)
          NODE

      - name: Detect changed entities
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: ${{ steps.discover.outputs.filters }} # JSON is valid YAML

      # Assemble the single changes.json the CD workflows read: apps/worker/packages/
      # workflows are lists of the changed names, root is a boolean. Also derive the
      # booleans + package matrix this CI run's own jobs gate on.
      - name: Assemble changes.json
        id: assemble
        env:
          CHANGES: ${{ steps.filter.outputs.changes }}
          ALL_PACKAGES: ${{ steps.discover.outputs.packages }}
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('fs')
          const changed = new Set(JSON.parse(process.env.CHANGES))
          const allPackages = JSON.parse(process.env.ALL_PACKAGES)
          const pick = (prefix) => [...changed].filter((k) => k.startsWith(prefix)).map((k) => k.slice(prefix.length))
          const apps = pick('app__')
          const worker = pick('worker__')
          const packages = pick('pkg__')
          const workflows = pick('wf__')
          const root = changed.has('root')
          fs.writeFileSync('changes.json', JSON.stringify({ apps, worker, packages, workflows, root }))
          // CI gating: a root or workflow change validates the whole workspace.
          const infra = root || workflows.length > 0
          const pkgsForCI = infra ? allPackages : packages
          const include = pkgsForCI.map((dir) => ({ dir, filter: require(`./packages/${dir}/package.json`).name, flag: dir }))
          console.log(`web=${apps.includes('web') || packages.length > 0 || infra}`)
          console.log(`worker=${worker.includes('api') || packages.includes('schema') || infra}`)
          console.log(`has_packages=${pkgsForCI.length ? 'true' : 'false'}`)
          console.log(`changed_packages=${JSON.stringify({ include })}`)
          NODE

      # Hand the single changes.json to the workflow_run-triggered CD workflows; they
      # carry no diff base of their own and read this run's answer (computed against
      # github.event.before..after) to decide whether to deploy/publish.
      - name: Upload changes.json
        uses: actions/upload-artifact@v7
        with:
          name: changes
          path: changes.json

  # Lint + typecheck the whole workspace once (cheap, recursive).
  lint:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        if: needs.prepare.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}
          cache: ${{ needs.prepare.outputs.manager }}

      - name: Install dependencies
        env:
          CI: true
        run: ${{ needs.prepare.outputs.manager }} ${{ needs.prepare.outputs.command }}

      - name: Run Lint
        run: ${{ needs.prepare.outputs.runner }} run lint

      - name: Run Typecheck
        run: ${{ needs.prepare.outputs.runner }} run typecheck

      # Fail the build if a publishable package bumped its version without adding the matching
      # release-notes/<version>.md — the same file cd-packages.yml requires before publishing.
      - name: Check release notes
        run: ${{ needs.prepare.outputs.runner }} run check:release-notes

  # Shared packages: one job per package, each uploads its own Codecov flag.
  packages:
    needs: [prepare, lint]
    if: needs.prepare.outputs.has_packages == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: CI
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.changed_packages) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        if: needs.prepare.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}
          cache: ${{ needs.prepare.outputs.manager }}

      - name: Install dependencies
        env:
          CI: true
        run: ${{ needs.prepare.outputs.manager }} ${{ needs.prepare.outputs.command }}

      - name: Run Tests with Coverage
        run: ${{ needs.prepare.outputs.runner }} --filter ${{ matrix.filter }} test:coverage

      # vitest writes lcov paths relative to the package (e.g. SF:src/index.ts), which is
      # ambiguous across the monorepo — Codecov can't map a lone src/index.ts (five exist)
      # and silently drops the flag's coverage. Prefix with the package dir so paths are
      # repo-relative and unique. $DIR via env (never spliced into the shell).
      - name: Make lcov paths repo-relative for Codecov
        env:
          DIR: ${{ matrix.dir }}
        run: sed -i "s#^SF:#SF:packages/$DIR/#" "packages/$DIR/coverage/lcov.info"

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/${{ matrix.dir }}/coverage/lcov.info
          slug: soroush-tech/core
          flags: ${{ matrix.flag }}
          name: ${{ matrix.dir }}

  # Cloudflare Worker API.
  worker:
    needs: [prepare, lint]
    if: needs.prepare.outputs.worker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: CI
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        if: needs.prepare.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}
          cache: ${{ needs.prepare.outputs.manager }}

      - name: Install dependencies
        env:
          CI: true
        run: ${{ needs.prepare.outputs.manager }} ${{ needs.prepare.outputs.command }}

      - name: Run Tests with Coverage
        run: ${{ needs.prepare.outputs.runner }} --filter @soroush/api test:coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./workers/api/coverage/lcov.info
          slug: soroush-tech/core
          flags: api
          name: api

  # Web app (ubuntu-only): unit / browser / storybook coverage tiers. The browser engines
  # (E2E) run in the separate `e2e` matrix job below.
  web:
    needs: [prepare, lint]
    if: needs.prepare.outputs.web == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: CI
    timeout-minutes: 30
    # Forward the CI-environment-scoped `VITE_BASE_URL` to the `e2e` job, which can't read it
    # itself (it stays off the environment to avoid a second approval). Non-secret value.
    outputs:
      vite_base_url: ${{ vars.VITE_BASE_URL }}

    # Pin the browser download location so the cache path/key is stable and shared with the
    # `e2e` job's chromium row on the same runner OS.
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/ms-playwright

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history for Codecov base detection
          persist-credentials: false

      - name: Setup pnpm
        if: needs.prepare.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}
          cache: ${{ needs.prepare.outputs.manager }}

      - name: Restore cache - Playwright binaries
        uses: actions/cache/restore@v5
        id: playwright-cache
        with:
          path: ${{ github.workspace }}/ms-playwright
          key: ${{ runner.os }}-playwright-${{ needs.prepare.outputs.playwright_version }}

      - name: Install dependencies
        env:
          CI: true
        run: ${{ needs.prepare.outputs.manager }} ${{ needs.prepare.outputs.command }}

      # Only Chromium is needed here — the unit-browser and storybook tiers run headless Chromium.
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @soroush/web exec playwright install --with-deps chromium

      # On a cache hit the binaries are restored, but Linux system libs live outside the cache.
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @soroush/web exec playwright install-deps chromium

      - name: Save cache - Playwright binaries
        if: always() && steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/ms-playwright
          key: ${{ runner.os }}-playwright-${{ needs.prepare.outputs.playwright_version }}

      - name: Build project
        run: ${{ needs.prepare.outputs.runner }} run build
        env:
          SKIP_PRERENDER: 'true'
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # Merged V8 pass over unit + browser + storybook, uploaded as the `web` flag that
      # `.codecov.yml` gates patch on. A single pass reports each file once with real execution
      # data — no phantom-uncovered lines from the per-tier `all: true` reports — so `web` is the
      # authoritative report and the per-tier flags below stay informational. Uploaded FIRST so
      # the Codecov PR comment renders from this report.
      - name: Run Web Coverage (merged)
        shell: bash
        run: |
          echo "### 🧪 Web — \`test:coverage\` (unit + browser + storybook, one V8 pass)" >> "$GITHUB_STEP_SUMMARY"
          ${{ needs.prepare.outputs.runner }} run test:coverage

      - name: Upload Web Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/web/coverage/lcov.info
          slug: soroush-tech/core
          flags: web
          name: Web

      - name: Run Unit Tests with Coverage
        shell: bash
        run: |
          echo "### 🧪 Unit — \`test:coverage:unit\`" >> "$GITHUB_STEP_SUMMARY"
          ${{ needs.prepare.outputs.runner }} run test:coverage:unit

      - name: Upload Unit Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/web/coverage/lcov.info
          slug: soroush-tech/core
          flags: unit
          name: Unit

      - name: Run Browser Tests with Coverage
        shell: bash
        run: |
          echo "### 🧪 Browser — \`test:coverage:browser\`" >> "$GITHUB_STEP_SUMMARY"
          ${{ needs.prepare.outputs.runner }} run test:coverage:browser

      - name: Upload Browser Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/web/coverage/lcov.info
          slug: soroush-tech/core
          flags: browser
          name: Browser

      - name: Run Storybook Tests with Coverage
        shell: bash
        run: |
          echo "### 🧪 Storybook — \`test:coverage:storybook\`" >> "$GITHUB_STEP_SUMMARY"
          ${{ needs.prepare.outputs.runner }} run test:coverage:storybook

      - name: Upload Storybook Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/web/coverage/lcov.info
          slug: soroush-tech/core
          flags: storybook
          name: Storybook

  # E2E: one engine per native OS. Chromium (ubuntu) runs with coverage → the `e2e` flag; Firefox
  # (windows) and WebKit (macOS) run for cross-engine signal only. Playwright's `webServer` builds
  # and serves the app, so there is no separate build step.
  e2e:
    needs: [prepare, lint, web]
    if: needs.prepare.outputs.web == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write # tokenless (OIDC) Codecov upload — see the upload step
    # No `environment: CI` on purpose — that would prompt a SECOND approval when e2e reaches the
    # gate in its own (post-web) wave. e2e still needs the CI-environment-scoped `VITE_BASE_URL`
    # (the dev-server SSR fetch in the article page's data() hook needs an absolute base, else the
    # relative `/gists/:id` URL throws in Node and the article title falls back to a placeholder),
    # so the already-gated `web` job reads it and forwards it via `needs.web.outputs.vite_base_url`.
    timeout-minutes: 30

    # Pin the browser download location so one cache path/key works on every OS.
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/ms-playwright

    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, engine: chromium, script: test:coverage:e2e, coverage: true }
          - { os: windows-latest, engine: firefox, script: test:e2e:firefox }
          - { os: macOS-latest, engine: webkit, script: test:e2e:webkit }

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        if: needs.prepare.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}
          cache: ${{ needs.prepare.outputs.manager }}

      - name: Restore cache - Playwright binaries
        uses: actions/cache/restore@v5
        id: playwright-cache
        with:
          path: ${{ github.workspace }}/ms-playwright
          key: ${{ runner.os }}-playwright-${{ needs.prepare.outputs.playwright_version }}

      - name: Install dependencies
        env:
          CI: true
        run: ${{ needs.prepare.outputs.manager }} ${{ needs.prepare.outputs.command }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @soroush/web exec playwright install --with-deps ${{ matrix.engine }}

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true' && runner.os == 'Linux'
        run: pnpm --filter @soroush/web exec playwright install-deps ${{ matrix.engine }}

      - name: Save cache - Playwright binaries
        if: always() && steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/ms-playwright
          key: ${{ runner.os }}-playwright-${{ needs.prepare.outputs.playwright_version }}

      - name: Run E2E (${{ matrix.engine }})
        run: ${{ needs.prepare.outputs.runner }} run ${{ matrix.script }}
        env:
          # From the `web` job's output — e2e is off the CI environment, so it can't read the
          # env-scoped `vars.VITE_BASE_URL` directly (see the job-level comment above).
          VITE_BASE_URL: ${{ needs.web.outputs.vite_base_url }}

      - name: Upload E2E Coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          use_oidc: true # tokenless upload (public repo) so e2e needs no CI-environment secret
          files: ./apps/web/coverage/e2e/lcov.info
          slug: soroush-tech/core
          flags: e2e
          name: E2E

  # Single stable status check for branch protection: tolerates change-gated jobs
  # being skipped, fails only if a required job actually failed or was cancelled.
  ci-ok:
    name: ci-ok
    if: always()
    needs: [prepare, lint, packages, worker, web, e2e]
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 5
    steps:
      - name: Require all jobs to pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "A required job failed or was cancelled."
          exit 1
