name: Publish Packages (npm)

# Publishes non-private packages to npm via Trusted Publishing (OIDC): a single named
# package, or `all` — every non-private package whose current version isn't on the
# registry yet. Manual dispatch only — never from a push, PR merge, or CI completion. A
# release is a deliberate act with required, human-written notes; auth is a short-lived
# id-token minted per run and verified against the npm trusted publisher (no long-lived
# token).

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish (`all` = every package with an unpublished version)
        required: true
        type: choice
        # gen:publish-options start — regenerated by `pnpm gen:publish-options`; do not edit by hand
        options:
          - all
          - bench
          - playwright-coverage
          - styled-system
          - vite-plugin-msw-server
        # gen:publish-options end

concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  publish:
    # main-only: a release always comes off the CI-passed main branch, even though the
    # dispatch UI lets you pick any ref.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: cd-packages
    timeout-minutes: 15
    permissions:
      id-token: write # OIDC token for npm Trusted Publishing (no NPM_TOKEN)
      contents: write # create the GitHub Release + tag
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      # Resolve the dispatch input to the list of packages this run publishes: the one
      # named package, or — for `all` — every non-private directory under packages/. The
      # choice list is generated from packages/ (scripts/gen-publish-options.mjs), but a
      # named package is still validated here as defense-in-depth: only non-private
      # packages may publish, and a hand-edit or private dir must not slip through. $PKG
      # is read from env (never spliced into shell) to avoid injection. Release notes are
      # sourced from an in-repo file (packages/<pkg>/release-notes/<version>.md) — require
      # one for every resolved package here, before publish, so a release can never ship
      # without notes and npm is never touched when any are missing.
      - name: Resolve packages
        env:
          PKG: ${{ inputs.package }}
        run: |
          if [ "$PKG" = "all" ]; then
            PKGS=$(node -e '
              const { readdirSync, existsSync } = require("node:fs")
              const names = readdirSync("packages", { withFileTypes: true })
                .filter((entry) => entry.isDirectory())
                .map((entry) => entry.name)
                .filter((name) => existsSync(`packages/${name}/package.json`))
                .filter((name) => require(`./packages/${name}/package.json`).private !== true)
                .sort()
              console.log(names.join(" "))
            ')
          else
            test -f "packages/$PKG/package.json" || { echo "::error::Unknown package: $PKG"; exit 1; }
            node -e 'process.exit(require(`./packages/${process.env.PKG}/package.json`).private === true ? 1 : 0)' \
              || { echo "::error::$PKG is private — not publishable"; exit 1; }
            PKGS="$PKG"
          fi
          for pkg in $PKGS; do
            VERSION=$(PKG="$pkg" node -p "require('./packages/'+process.env.PKG+'/package.json').version")
            test -f "packages/$pkg/release-notes/$VERSION.md" \
              || { echo "::error::Missing release notes: packages/$pkg/release-notes/$VERSION.md"; exit 1; }
          done
          echo "PKGS=$PKGS" >> "$GITHUB_ENV"

      - name: Read Node.js version from .nvmrc
        run: echo "NODE_VERSION=$(cat .nvmrc)" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Publish each resolved package via npm Trusted Publishing (OIDC). Auth comes from
      # the id-token minted above — there is no NPM_TOKEN, and NODE_AUTH_TOKEN must stay
      # unset (even an empty value makes pnpm use token auth instead of falling back to
      # OIDC). Skip a version already on the registry rather than fail trying to republish
      # it — with `all`, that skip is the filter: only packages whose version isn't on npm
      # yet actually publish. Bump a package version on main to release it. Each package
      # runs in a subshell so a skip exits only that iteration and cd resets.
      - name: Publish packages
        run: |
          for pkg in $PKGS; do
            (
              cd "packages/$pkg"
              name=$(node -p "require('./package.json').name")
              version=$(node -p "require('./package.json').version")
              if npm view "$name@$version" version >/dev/null 2>&1; then
                echo "⏭️ \`$name@$version\` already on npm — skipped (bump the version to release)." >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
              pnpm publish --no-git-checks
              echo "### 📦 Published \`$name@$version\`" >> "$GITHUB_STEP_SUMMARY"
              echo "https://www.npmjs.com/package/$name/v/$version" >> "$GITHUB_STEP_SUMMARY"
              echo "::notice title=Published::$name@$version"
            )
          done

      # Create each package's GitHub Release if it doesn't already exist — gated on the
      # release's existence, not on whether npm was newly published, so a rerun can repair
      # a missing release after a successful publish. Notes come from the in-repo file
      # packages/<pkg>/release-notes/<version>.md (its existence was checked in the
      # Resolve step, before publish); --notes-file reads it verbatim. $pkg comes from the
      # resolved list (repo directory names), never spliced from the dispatch input.
      - name: Create GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for pkg in $PKGS; do
            name=$(PKG="$pkg" node -p "require('./packages/'+process.env.PKG+'/package.json').name")
            version=$(PKG="$pkg" node -p "require('./packages/'+process.env.PKG+'/package.json').version")
            tag="$name@$version"
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "⏭️ GitHub Release \`$tag\` already exists — skipped." >> "$GITHUB_STEP_SUMMARY"
              continue
            fi
            gh release create "$tag" --title "$tag" --notes-file "packages/$pkg/release-notes/$version.md"
            echo "### 🏷️ Released \`$tag\`" >> "$GITHUB_STEP_SUMMARY"
          done
